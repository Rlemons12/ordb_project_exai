<header class="oracle-main-header">
    <div class="oracle-main-header-text">
        <p class="oracle-main-eyebrow">
            {{ project_name | default("ordb_project_exai") }}
        </p>

        <h1>
            {{ page_heading | default("Oracle AI") }}
        </h1>

        <p class="oracle-main-subtitle">
            {{ page_subtitle | default("Oracle AI demo console.") }}
        </p>
    </div>

    <div class="oracle-main-status-card">
        <span class="exai-status-dot" id="health-dot"></span>

        <div>
            <strong id="health-title">
                {{ health_title | default("Checking") }}
            </strong>

            <small id="health-detail">
                {{ health_detail | default("Waiting for service status...") }}
            </small>
        </div>
    </div>
</header>
